<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AI-powered multilingual translator with real-time translation across 40+ languages">
  <title>AI Translator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Animated Background -->
  <canvas id="bg-canvas" aria-hidden="true"></canvas>

  <!-- Floating Top Bar -->
  <header class="floating-bar" id="floating-bar">
    <div class="bar-drag-region"></div>
    <div class="bar-inner">
      <div class="bar-brand">
        <div class="bar-logo">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="url(#barGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <defs>
              <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#818cf8"/>
                <stop offset="100%" stop-color="#c084fc"/>
              </linearGradient>
            </defs>
            <path d="m5 8 6 6"/>
            <path d="m4 14 6 6 2-3"/>
            <path d="M2 5h12"/>
            <path d="M7 2h1"/>
            <path d="m22 22-5-10-5 10"/>
            <path d="M14 18h6"/>
          </svg>
        </div>
        <span class="bar-title">AI Translator</span>
      </div>
      
      <div class="bar-controls">
        <div class="bar-meta">
          <span class="connection-badge" id="connection-badge">
            <span class="conn-dot"></span>
            Software Mode
          </span>
        </div>
        <div class="window-actions">
          <button class="win-btn theme-toggle" id="theme-toggle" aria-label="Toggle Theme">
            <svg class="sun-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <svg class="moon-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
          <button class="win-btn" id="win-min" aria-label="Minimize">
            <svg width="12" height="12" viewBox="0 0 12 12"><rect y="5" width="12" height="1.5" rx="0.75" fill="currentColor"/></svg>
          </button>
          <button class="win-btn" id="win-max" aria-label="Maximize">
            <svg width="12" height="12" viewBox="0 0 12 12"><rect x="1" y="1" width="10" height="10" rx="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
          </button>
          <button class="win-btn btn-close" id="win-close" aria-label="Close">
            <svg width="12" height="12" viewBox="0 0 12 12"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- Main App Container -->
  <main class="app-container" id="app-container" style="display:none;">
    <!-- Step Indicator -->
    <div class="step-indicator" id="step-indicator">
      <div class="step active" data-step="1">
        <div class="step-num">1</div>
        <span>Configure</span>
      </div>
      <div class="step-line"></div>
      <div class="step" data-step="2">
        <div class="step-num">2</div>
        <span>Translate</span>
      </div>
      <div class="step-line"></div>
      <div class="step" data-step="3">
        <div class="step-num">3</div>
        <span>Results</span>
      </div>
    </div>

    <!-- Panel: Language Selection (Step 1) -->
    <section class="panel panel-config" id="panel-config" aria-labelledby="config-title">
      <div class="panel-card glass-card">
        <h2 id="config-title" class="panel-title">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
          Which language do you want to translate from/to?
        </h2>

        <div class="lang-selectors">
          <!-- FROM Language -->
          <div class="lang-group">
            <label class="lang-label" for="lang-from">Translate from</label>
            <div class="select-wrapper">
              <select id="lang-from" class="lang-select" aria-label="Source language">
                <option value="" disabled selected>Select source language...</option>
              </select>
              <div class="select-arrow">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
              </div>
            </div>
          </div>

          <!-- Swap Button -->
          <button class="swap-btn" id="swap-btn" aria-label="Swap languages" title="Swap languages">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="m7 15 5 5 5-5"/>
              <path d="m7 9 5-5 5 5"/>
            </svg>
          </button>

          <!-- TO Language -->
          <div class="lang-group">
            <label class="lang-label" for="lang-to">Translate to</label>
            <div class="select-wrapper">
              <select id="lang-to" class="lang-select" aria-label="Target language">
                <option value="" disabled selected>Select target language...</option>
              </select>
              <div class="select-arrow">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
              </div>
            </div>
          </div>
        </div>

        <!-- Text Input -->
        <div class="input-area">
          <label class="lang-label" for="input-text">Enter text to translate</label>
          <div class="textarea-wrapper">
            <textarea
              id="input-text"
              class="input-textarea"
              placeholder="Type or paste your text here..."
              rows="5"
              maxlength="50000"
              aria-label="Text to translate"
            ></textarea>
            <div class="char-count">
              <span id="char-count">0</span> / 50,000
            </div>
          </div>
        </div>

        <!-- Action Row -->
        <div class="action-row">
          <button class="secondary-btn" id="clear-btn" aria-label="Clear input">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
            </svg>
            Clear
          </button>
          <button class="primary-btn" id="translate-btn" disabled aria-label="Translate text">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="m5 8 6 6"/>
              <path d="m4 14 6 6 2-3"/>
              <path d="M2 5h12"/>
              <path d="M7 2h1"/>
              <path d="m22 22-5-10-5 10"/>
              <path d="M14 18h6"/>
            </svg>
            <span>Translate</span>
            <div class="btn-loader" id="btn-loader" style="display:none;">
              <div class="loader-spinner"></div>
            </div>
          </button>
        </div>
        <p class="kbd-hint">Press <kbd>Ctrl</kbd> + <kbd>Enter</kbd> to translate</p>
      </div>
    </section>

    <!-- Panel: Results (Step 3) -->
    <section class="panel panel-results" id="panel-results" style="display:none;" aria-labelledby="results-title">
      <div class="panel-card glass-card">
        <!-- Result Header -->
        <div class="result-header">
          <h2 id="results-title" class="panel-title">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            Translation Complete
          </h2>
          <div class="result-meta" id="result-meta"></div>
        </div>

        <!-- Original Text -->
        <div class="result-block original">
          <div class="result-block-header">
            <span class="result-lang" id="result-from-lang"></span>
            <button class="icon-btn" id="copy-original" aria-label="Copy original text" title="Copy">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>
            </button>
          </div>
          <p class="result-text" id="result-original"></p>
        </div>

        <!-- Arrow -->
        <div class="result-arrow">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/>
          </svg>
        </div>

        <!-- Translated Text -->
        <div class="result-block translated">
          <div class="result-block-header">
            <span class="result-lang" id="result-to-lang"></span>
            <div class="result-actions">
              <button class="icon-btn" id="copy-translated" aria-label="Copy translated text" title="Copy">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                </svg>
              </button>
              <button class="icon-btn" id="speak-translated" aria-label="Listen to translation" title="Listen">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                </svg>
              </button>
            </div>
          </div>
          <p class="result-text translated-text" id="result-translated"></p>
        </div>

        <!-- Match Score -->
        <div class="match-bar" id="match-bar">
          <div class="match-label">Confidence</div>
          <div class="match-track">
            <div class="match-fill" id="match-fill"></div>
          </div>
          <span class="match-value" id="match-value"></span>
        </div>

        <!-- Result Actions -->
        <div class="action-row">
          <button class="secondary-btn" id="redirect-btn" aria-label="New translation">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
            </svg>
            New Translation
          </button>
          <button class="secondary-btn" id="edit-btn" aria-label="Edit and re-translate">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>
            </svg>
            Edit & Retry
          </button>
        </div>
      </div>

      <!-- Translation History -->
      <div class="history-card glass-card" id="history-card" style="display:none;">
        <div class="history-header">
          <h3 class="history-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
            Recent Translations
          </h3>
          <button class="icon-btn" id="clear-history" aria-label="Clear history" title="Clear history">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
            </svg>
          </button>
        </div>
        <div class="history-list" id="history-list"></div>
      </div>
    </section>

    <!-- Error Panel -->
    <section class="panel panel-error" id="panel-error" style="display:none;" role="alert">
      <div class="panel-card glass-card error-card">
        <div class="error-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        </div>
        <h2 class="error-title" id="error-title">Translation Failed</h2>
        <p class="error-message" id="error-message">Something went wrong. Please try again.</p>
        <div class="action-row">
          <button class="primary-btn" id="retry-btn" aria-label="Retry translation">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
            </svg>
            <span>Retry</span>
          </button>
          <button class="secondary-btn" id="back-btn" aria-label="Go back">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
            </svg>
            Back
          </button>
        </div>
      </div>
    </section>
  </main>

  <!-- Toast Notification -->
  <div class="toast" id="toast" role="status" aria-live="polite">
    <span id="toast-message"></span>
  </div>

  <script src="app.js"></script>
</body>
</html>
